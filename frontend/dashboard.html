<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - UPE Connect Hub</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="dashboard-body">
    <nav class="navbar">
        <div class="nav-brand"><span>UPE</span> Connect Hub</div>
        <div class="nav-user">
            <span id="user-name">Carregando...</span>
            <a href="perfil.html" class="btn-primary" style="margin-right: 15px; padding: 6px 12px; background: transparent; border: 1px solid white; text-decoration: none;">Meu Perfil</a>
            <button id="logout-btn" class="btn-logout">Sair</button>
        </div>
    </nav>
    <main class="dashboard-container">
        <header class="dashboard-header">
            <h2>Vagas em Destaque</h2>
            <p>Explore as oportunidades acadêmicas e profissionais abertas no momento.</p>
        </header>
        <div id="vagas-grid" class="vagas-grid">
            <p class="loading-text">Consultando o banco de dados PostgreSQL...</p>
        </div>
    </main>
    <script src="js/dashboard.js"></script>
</body>
</html>
